<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Week 14 Data Encryption Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="shell">
      <header class="hero">
        <p class="badge">Week 14</p>
        <h1>Wearable Data Encryption Pipeline</h1>
        <p class="subtext">
          Incoming wearable JSON is encrypted with CryptoJS and saved as ciphertext in MongoDB.
        </p>
      </header>

      <section class="grid">
        <article class="card">
          <h2>Ingest Payload</h2>
          <form id="ingestForm" class="stack">
            <label>
              Device ID
              <input id="deviceId" name="deviceId" type="text" value="watch-701" required />
            </label>

            <label>
              Heart Rate
              <input id="heartRate" name="heartRate" type="number" value="84" required />
            </label>

            <label>
              Steps
              <input id="steps" name="steps" type="number" value="4200" required />
            </label>

            <label>
              Sleep Hours
              <input id="sleepHours" name="sleepHours" type="number" step="0.1" value="7.1" />
            </label>

            <button id="submitBtn" type="submit">Encrypt And Store</button>
            <p id="ingestMessage" class="message"></p>
          </form>
        </article>

        <article class="card">
          <div class="row">
            <h2>Recent Ciphertexts</h2>
            <button id="refreshBtn" class="ghost" type="button">Refresh</button>
          </div>
          <p class="hint">Only encrypted payload text is stored.</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Device</th>
                  <th>Ciphertext</th>
                  <th>Received At</th>
                </tr>
              </thead>
              <tbody id="recordsBody"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
