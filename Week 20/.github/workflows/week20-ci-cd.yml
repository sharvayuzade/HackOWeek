name: Week 20 CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'Week 20/backend/**'
      - 'Week 20/frontend/**'
      - 'Week 20/Dockerfile'
      - 'Week 20/README.md'
      - 'Week 20/.github/workflows/week20-ci-cd.yml'
  pull_request:
    paths:
      - 'Week 20/backend/**'
      - 'Week 20/frontend/**'
      - 'Week 20/Dockerfile'
      - 'Week 20/README.md'
      - 'Week 20/.github/workflows/week20-ci-cd.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Week 20/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify syntax
        run: npm run verify

  deploy_heroku:
    needs: verify
    if: github.ref == 'refs/heads/main' && vars.ENABLE_HEROKU_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: Week 20/backend